[phases.setup]
aptPkgs = [
    "libnss3",
    "libnspr4",
    "libatk1.0-0",
    "libatk-bridge2.0-0",
    "libcups2",
    "libdrm2",
    "libxkbcommon0",
    "libxcomposite1",
    "libxdamage1",
    "libxext6",
    "libxfixes3",
    "libxrandr2",
    "libgbm1",
    "libasound2t64",
    "libpangocairo-1.0-0",
    "libpango-1.0-0",
    "libcairo-gobject2",
    "libcairo2",
    "libgtk-3-0",
    "libxshmfence1"
]

[phases.install]
cmds = [
    "composer install",
    "npm install",
    "npm install -g puppeteer",
    "npx puppeteer browsers install chrome-headless-shell"
]
